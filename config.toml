# DevMate 配置文件

[app]
project_name = "DevMate"
docs_dir = "docs"
log_level = "INFO"

[model]
provider = "minimax"
api_format = "openai-compatible"
# International endpoint: https://api.minimax.io/v1
# China mainland endpoint: https://api.minimaxi.com/v1
ai_base_url = "https://api.minimax.io/v1"
api_key = "your_minimax_api_key_here"
model_name = "MiniMax-M2"
# DashScope Beijing OpenAI-compatible embeddings endpoint:
# https://dashscope.aliyuncs.com/compatible-mode/v1
# DashScope Singapore OpenAI-compatible embeddings endpoint:
# https://dashscope-intl.aliyuncs.com/compatible-mode/v1
embedding_base_url = "https://dashscope.aliyuncs.com/compatible-mode/v1"
embedding_api_key = "sk-ef17349b734e400ca0ea276503bca35d"
embedding_model_name = "text-embedding-v4"

[search]
tavily_api_key = "your_tavily_api_key_here"
default_max_results = 5
request_timeout_seconds = 20.0

[mcp]
server_url = "http://localhost:8001/mcp"
transport = "streamable_http"
tool_timeout_seconds = 30.0
healthcheck_timeout_seconds = 5.0

[rag]
provider = "chromadb"
collection_name = "devmate-docs"
persist_directory = ".chroma/devmate-docs"
chunk_size = 800
chunk_overlap = 120
top_k = 4

[langsmith]
langchain_tracing_v2 = true
langchain_api_key = "your_langchain_api_key_here"

[skills]
skills_dir = ".skills"
