# Docker-oriented DevMate config.

[app]
project_name = "DevMate"
docs_dir = "/app/docs"
log_level = "INFO"

[model]
ai_base_url = "${MINIMAX_BASE_URL}"
api_key = "${MINIMAX_API_KEY}"
model_name = "${MINIMAX_MODEL_NAME}"
embedding_base_url = "${DASHSCOPE_BASE_URL}"
embedding_api_key = "${DASHSCOPE_API_KEY}"
embedding_model_name = "${DASHSCOPE_EMBEDDING_MODEL}"

[search]
tavily_api_key = "${TAVILY_API_KEY}"
default_max_results = 5
request_timeout_seconds = 20.0

[mcp]
server_url = "http://devmate-mcp:8001/mcp"
transport = "streamable_http"
tool_timeout_seconds = 30.0
healthcheck_timeout_seconds = 5.0

[rag]
provider = "chromadb"
collection_name = "devmate-docs"
persist_directory = "/app/.chroma/devmate-docs"
chunk_size = 800
chunk_overlap = 120
top_k = 4

[langsmith]
langchain_tracing_v2 = true
langchain_api_key = "${LANGSMITH_API_KEY}"
project_name = "DevMate"
endpoint = "${LANGSMITH_ENDPOINT}"
share_public_traces = false

[skills]
skills_dir = "/app/.skills"
